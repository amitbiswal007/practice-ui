<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #F4EDFF;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 90vh;
        }

        .modal {
            background-color: #fff;
            padding: 40px;
            border-radius: 20px;
            width: 400px;
            box-shadow: 5px 5px #DED1F5
        }

        .modal-body {
            margin-top:30px;
            display: flex;
            flex-direction: row;
            gap: 10px;
            align-items: center;
        }

        .modal-footer {
            display: flex;
            flex-direction: row;
            justify-content: flex-end;
            gap: 10px;
        }

        .btn {
            border: 1px solid;
            border-radius: 10px;
            display: inline-block;
            padding: 10px 20px 10px 20px;
         
        }

        .red {
            border-color: #FFC9C9;
            color: #FF3636;
        }

        .green {
            border-color: #A8EDB7;
            color: #15C13A;

        }

        svg {
            width: 30px;
           
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="modal">
            <span style="font-weight: bolder;font-size: 20px;">Show notifications for
            </span>

            <span style="float: right;">
                X
            </span>
            <br>
            <div class="modal-body">
                <span>

                    <svg xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 640 640"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.-->
                        <path
                            d="M320 64C306.7 64 296 74.7 296 88L296 97.7C214.6 109.3 152 179.4 152 264L152 278.5C152 316.2 142 353.2 123 385.8L101.1 423.2C97.8 429 96 435.5 96 442.2C96 463.1 112.9 480 133.8 480L506.2 480C527.1 480 544 463.1 544 442.2C544 435.5 542.2 428.9 538.9 423.2L517 385.7C498 353.1 488 316.1 488 278.4L488 263.9C488 179.3 425.4 109.2 344 97.6L344 87.9C344 74.6 333.3 63.9 320 63.9zM488.4 432L151.5 432L164.4 409.9C187.7 370 200 324.6 200 278.5L200 264C200 197.7 253.7 144 320 144C386.3 144 440 197.7 440 264L440 278.5C440 324.7 452.3 370 475.5 409.9L488.4 432zM252.1 528C262 556 288.7 576 320 576C351.3 576 378 556 387.9 528L252.1 528z" />
                    </svg>

                </span>
                <span>
                    www.website.com
                </span>
            </div>
            <br>
            <div class="modal-footer">
                <div class="btn red">
                    Block
                </div>
                <div class="btn green">
                    Allow
                </div>
            </div>

        </div>

    </div>
    <div style="text-align: center;">
        <p>
            Design Inspiration: <a href="https://www.uidesigndaily.com/posts/figma-notification-day-1559"
                target="_blank">Notifications - By UI
                Design Daily
            </a>
        </p>
        <p>
            Notes: I could have made it javascript based to popup like a modal. But at this moment, focus is on CSS. We
            can enhance later.
        </p>
    </div>

</body>

</html>
