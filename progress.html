<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress</title>
    <style>
        body {
            background-color: #F5F5FD;
        }

        .card {
            background-color: #FFFFFF;
            padding: 20px;
            border-radius: 20px;
        }

        .progress-circle {
            border: 3px solid #D1D0F5;
            display: inline-block;
            padding: 10px;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            text-align: center;
            line-height: 20px;
            font-weight: bolder;
        }
    </style>

</head>

<body>

    <div class="card">

        <h2>Your progress</h2>

        <div class="progress-circle">93%</div>
        <div class="help-text">
            <h2>32 of 42 complete</h2>
            Finish course to get certificate
        </div>

    </div>

    <div>

        <p>
            Credits:
            <br>
            Design Inspiration: <a href="https://www.uidesigndaily.com/posts/progress" target="_blank">UI Design Daily - Progress</a>
        </p>

    </div>

</body>

</html>
