<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forum UI Component Cards</title>
    <style>
        body {
            background-color: #EEEEEE;
        }

        .card {
            background-color: #FFFFFF;
            display: inline-block;
            padding: 10px;
            width:400px;
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                Connect your account
                <span class="close-btn">
                    x
                </span>
            </div>
            <hr>
            <div class="profile-icon">
                IG
            </div>
            <div class="profile-name">
                John Smith
            </div>
            <div class="profile-email">
                john.smith@email.com
            </div>
            <div class="continue-btn">
                Continue as John Smith
            </div>
        </div>


    </div>
    <div style="text-align: center;">
        <p>
            Design Inspiration: <a
                href="https://www.uidesigndaily.com/posts/figma-forum-ui-components-list-card-log-in-day-1507"
                target="_blank">Forum UI Card Components - By UI
                Design Daily
            </a>
        </p>
        <p>
            Future enhancement:
        </p>
    </div>
</body>

</html>
